{% extends 'base.html' %}
{% block title %}Remove Data Center — Latitude.sh Inventory{% endblock %}
{% block content %}
<div class="card" style="max-width:440px;">
  <div class="card-body">
    <h5>Remove Data Center</h5>
    <p>Are you sure you want to remove <strong>{{ object.nome }}</strong>?</p>
    <form method="post">
      {% csrf_token %}
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-danger">Remove</button>
        <a href="{% url 'datacenter_lista' %}" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
