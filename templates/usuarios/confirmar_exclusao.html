{% extends 'base.html' %}
{% block title %}Remover Usuário — Inventário DC{% endblock %}
{% block content %}
<div class="card" style="max-width:440px;">
  <div class="card-body">
    <h5>Remover usuário</h5>
    <p>Tem certeza que deseja remover o usuário <strong>{{ object.username }}</strong>?</p>
    <form method="post">
      {% csrf_token %}
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-danger">Remover</button>
        <a href="{% url 'usuario_lista' %}" class="btn btn-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
