{% extends 'base.html' %}
{% block title %}Remove Type — Inventory DC{% endblock %}
{% block content %}
<div class="card" style="max-width:440px;">
  <div class="card-body">
    <h5>Remove component type</h5>
    <p>Are you sure you want to remove the type <strong>{{ tipo }}</strong>?</p>
    <form method="post">
      {% csrf_token %}
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-danger">Remove</button>
        <a href="{% url 'tipo_lista' %}" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
