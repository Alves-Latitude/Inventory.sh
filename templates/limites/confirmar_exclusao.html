{% extends 'base.html' %}
{% block title %}Remove Limit — Inventory DC{% endblock %}
{% block content %}
<div class="card" style="max-width:440px;">
  <div class="card-body">
    <h5>Remove limit</h5>
    <p>Remove the stock limit for <strong>{{ object }}</strong>?</p>
    <form method="post">
      {% csrf_token %}
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-danger">Remove</button>
        <a href="{% url 'limite_lista' %}" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
